version: '3.8'

services:
  flashdb:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=your-secret-key-change-in-production
      - PERSIST_INTERVAL=5s
    volumes:
      - flashdb-data:/app/data
    restart: unless-stopped

volumes:
  flashdb-data:
